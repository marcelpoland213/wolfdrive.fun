<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WolfDrive - We're Live!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #0f172a, #1e1b4b, #312e81, #020617);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            color: #ffffff;
        }

        /* Animated Background */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Glassmorphism Card UI */
        .ui-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 4rem;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(30px);
            opacity: 0;
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .ui-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 35px 60px -15px rgba(0, 0, 0, 0.6);
        }

        /* Entry Animation */
        @keyframes slideUpFade {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Typography & Logo */
        .logo-container {
            margin-bottom: 1.5rem;
            animation: pulse 3s infinite;
        }

        .logo-icon {
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .title {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .subtitle {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 2.5rem;
        }

        /* Action Section */
        .action-container {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
            align-items: center;
        }

        .live-text {
            font-size: 1.25rem;
            font-weight: 600;
            color: #e2e8f0;
        }

        /* Button / Link */
        .btn-link {
            text-decoration: none;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 0.8rem 2.5rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
            overflow: hidden;
            box-shadow: 0 10px 20px -10px rgba(168, 85, 247, 0.7);
        }

        .btn-link::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, #a855f7 0%, #6366f1 100%);
            z-index: -1;
            transition: opacity 0.3s ease;
            opacity: 0;
        }

        .btn-link:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px -10px rgba(168, 85, 247, 0.9);
        }

        .btn-link:hover::before {
            opacity: 1;
        }

        /* Subtle pulsing effect for the logo */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="ui-card">
        <div class="logo-container">
            <span class="logo-icon">🐺</span>
            <h1 class="title">WolfDrive</h1>
        </div>
        
        <p class="subtitle">The next generation of cloud storage.</p>
        
        <div class="action-container">
            <span class="live-text">We're live!!</span>
            <!-- Redirect Link Here -->
            <a href="https://cloud.wolfdrive.fun" class="btn-link">click here!</a>
        </div>
    </div>

</body>
</html>
